<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qui est-ce ?</title>

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #1e1e1e;
    color: white;
    font-family: 'Lilita One', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CONTENEUR */
.container {
    width: 100%;
    max-width: 1200px;
    padding: 10px;
    box-sizing: border-box;
}

/* LOGO */
.logo {
    display: block;
    margin: 0 auto 10px;
    width: 60%;
    max-width: 300px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
    gap: 6px;
}

/* CASE */
.case {
    aspect-ratio: 1/1;
    background: white;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

.case img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.case.croix::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,0,0,0.5);
}

/* INPUT */
.input-container {
    text-align: center;
    margin: 20px 0;
}

.input-container input {
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #333;
    color: white;
    font-family: 'Lilita One';
}

/* FOOTER */
.footer {
    text-align: center;
    margin-bottom: 10px;
}

.footer a {
    color: white;
    text-decoration: none;
}

/* 💻 PC → plus de colonnes = moins zoom */
@media (min-width: 1200px) {
    .container {
        max-width: 1600px;
    }

    .grid {
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    }
}

/* 📱 MOBILE */
@media (max-width: 500px) {
    .grid {
        grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
    }
}
</style>
</head>

<body>

<div class="container">

<img src="images/logo.png" class="logo">

<div class="grid">
<script>
for (let i = 1; i <= 101; i++) {
    document.write(`
        <div class="case" onclick="this.classList.toggle('croix')">
            <img src="images/${i}.png">
        </div>
    `);
}
</script>
</div>

<div class="input-container">
    <div>Nom du personnage choisi :</div>
    <input type="text">
</div>

</div>

<div class="footer">
    <a href="https://locyzz.fr/" target="_blank">Site créé par locyzz</a> •
    <a href="https://youtube.com/@king.citron" target="_blank">Concept de Citron</a>
</div>

</body>
</html>
